spring:
  datasource:
    url: jdbc:h2:mem:course_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: warn
    com.liuxiang: info
